<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTG Kortprisscanner</title>
<style>
  :root {
    --bg: #0f0f13; --surface: #1a1a24; --surface2: #22222f;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --text: #f0f0f4; --text2: #9090a8; --text3: #5a5a72;
    --accent: #7c6af7; --accent2: #5b52c4;
    --success: #3ecf7c; --warn: #f0a429; --danger: #f04f4f;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; padding: 1.5rem 1rem 3rem; max-width: 480px; margin: 0 auto; }
  header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--border); }
  .logo { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  h1 { font-size: 18px; font-weight: 600; }
  .subtitle { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .section { margin-bottom: 1.25rem; }
  label.fl { display: block; font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  input[type="password"] { width: 100%; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; padding: 10px 14px; outline: none; }
  input:focus { border-color: var(--accent); }
  .drop-zone { background: var(--surface); border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 2.5rem 1rem; text-align: center; cursor: pointer; position: relative; }
  .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-icon { font-size: 36px; margin-bottom: 10px; }
  .drop-text { font-size: 15px; color: var(--text2); }
  .drop-sub { font-size: 13px; color: var(--text3); margin-top: 4px; }
  .preview-wrap { display: none; align-items: flex-start; gap: 12px; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 12px; }
  .preview-wrap img { width: 80px; border-radius: 6px; flex-shrink: 0; }
  .preview-filename { font-size: 13px; font-weight: 500; word-break: break-all; }
  .preview-size { font-size: 12px; color: var(--text3); margin-top: 2px; }
  #steps { display: none; margin-bottom: 1.25rem; }
  .step { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .step:last-child { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); margin-top: 6px; flex-shrink: 0; transition: background 0.2s; }
  .dot.active { background: var(--accent); }
  .dot.done { background: var(--success); }
  .dot.error { background: var(--danger); }
  .step-title { font-size: 14px; font-weight: 500; }
  .step-detail { font-size: 13px; color: var(--text2); margin-top: 2px; }
  #resultArea { display: none; }
  .result-card { background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 10px; }
  .card-name { font-size: 20px; font-weight: 600; margin-bottom: 2px; }
  .card-set { font-size: 14px; color: var(--text2); margin-bottom: 1rem; }
  .price-section { background: var(--surface2); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 1rem; }
  .price-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .price-value { font-size: 32px; font-weight: 700; color: var(--success); }
  .price-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .meta-row { display: flex; justify-content: space-between; padding: 7px 0; border-top: 0.5px solid var(--border); font-size: 14px; }
  .meta-key { color: var(--text2); }
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-ok { background: rgba(62,207,124,0.15); color: var(--success); }
  .badge-warn { background: rgba(240,164,41,0.15); color: var(--warn); }
  .badge-err { background: rgba(240,79,79,0.15); color: var(--danger); }
  .btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn:active { transform: scale(0.98); }
  .btn-sm { width: auto; padding: 0 16px; height: 38px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .btn-ghost { background: none; border: 0.5px solid var(--border2); color: var(--text2); border-radius: var(--radius-sm); padding: 3px 10px; font-size: 12px; cursor: pointer; }
  .cm-link { display: block; text-align: center; background: var(--surface2); color: var(--accent); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 11px; font-size: 14px; font-weight: 500; text-decoration: none; }
  .warn-box { background: rgba(240,164,41,0.08); border: 0.5px solid rgba(240,164,41,0.3); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; color: var(--warn); margin-bottom: 10px; }
  .key-saved { font-size: 13px; color: var(--success); display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; }
  #log { font-size: 11px; color: var(--text3); font-family: monospace; background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 10px; max-height: 120px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; margin-top: 8px; display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">🃏</div>
  <div>
    <h1>MTG Kortprisscanner</h1>
    <div class="subtitle">Trend-pris fra Cardmarket</div>
  </div>
</header>

<div id="apiKeySection" class="section">
  <label class="fl">Anthropic API-nøgle</label>
  <div style="display:flex;gap:8px;">
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-...">
    <button class="btn-sm" onclick="saveApiKey()">Gem</button>
  </div>
  <p style="font-size:12px;color:var(--text3);margin-top:5px;">Gemmes i din browser — aldrig i koden</p>
</div>

<div id="apiKeySaved" class="key-saved" style="display:none;">
  ✓ API-nøgle gemt
  <button class="btn-ghost" onclick="changeApiKey()">Skift</button>
</div>

<div class="section">
  <label class="fl">Kortbillede</label>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*" capture="environment">
    <div class="drop-icon">📷</div>
    <div class="drop-text">Tag billede eller upload</div>
    <div class="drop-sub">Tryk her for at vælge fil</div>
  </div>
  <div class="preview-wrap" id="previewWrap">
    <img id="previewImg" src="" alt="Kort">
    <div>
      <div class="preview-filename" id="previewName"></div>
      <div class="preview-size" id="previewSize"></div>
    </div>
  </div>
</div>

<div id="steps">
  <div class="step">
    <div class="dot" id="d1"></div>
    <div><div class="step-title" id="t1">Genkender kort...</div><div class="step-detail" id="det1"></div></div>
  </div>
  <div class="step">
    <div class="dot" id="d2"></div>
    <div><div class="step-title" id="t2">Henter pris...</div><div class="step-detail" id="det2"></div></div>
  </div>
</div>

<div id="resultArea"></div>
<div id="log"></div>

<script>
  let imageBase64 = null, imageMime = 'image/jpeg';

  function getApiKey() { return localStorage.getItem('mtg_api_key') || ''; }

  function saveApiKey() {
    const k = document.getElementById('apiKeyInput').value.trim();
    if (!k) return;
    localStorage.setItem('mtg_api_key', k);
    document.getElementById('apiKeySection').style.display = 'none';
    document.getElementById('apiKeySaved').style.display = 'flex';
  }

  function changeApiKey() {
    document.getElementById('apiKeyInput').value = '';
    document.getElementById('apiKeySection').style.display = 'block';
    document.getElementById('apiKeySaved').style.display = 'none';
  }

  if (getApiKey()) {
    document.getElementById('apiKeySection').style.display = 'none';
    document.getElementById('apiKeySaved').style.display = 'flex';
  }

  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  function handleFile(file) {
    if (!getApiKey()) { alert('Gem din Anthropic API-nøgle først.'); return; }
    imageMime = file.type || 'image/jpeg';
    const reader = new FileReader();
    reader.onload = ev => {
      imageBase64 = ev.target.result.split(',')[1];
      document.getElementById('previewImg').src = ev.target.result;
      document.getElementById('previewName').textContent = file.name;
      document.getElementById('previewSize').textContent = (file.size/1024).toFixed(0) + ' KB';
      document.getElementById('previewWrap').style.display = 'flex';
      document.getElementById('dropZone').style.display = 'none';
      startScan();
    };
    reader.readAsDataURL(file);
  }

  function log(msg) {
    const el = document.getElementById('log');
    el.style.display = 'block';
    el.textContent += msg + '\n';
    el.scrollTop = el.scrollHeight;
  }

  function setStep(n, title, detail, state) {
    document.getElementById('t'+n).textContent = title;
    document.getElementById('det'+n).textContent = detail || '';
    document.getElementById('d'+n).className = 'dot ' + (state||'');
  }

  async function startScan() {
    document.getElementById('steps').style.display = 'block';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('log').style.display = 'none';
    document.getElementById('log').textContent = '';
    setStep(1,'Genkender kort via Claude Vision...','','active');
    setStep(2,'Henter pris fra Scryfall...','','');

    let card = null;
    try {
      card = await recognizeCard();
      setStep(1,'Kort genkendt', card.name + (card.set ? ' · '+card.set : ''), 'done');
      log('Genkendt: '+JSON.stringify(card));
    } catch(err) {
      setStep(1,'Genkendelse fejlede', err.message, 'error');
      showError('Kunne ikke genkende kortet: ' + err.message);
      return;
    }

    setStep(2,'Henter pris fra Scryfall...','','active');
    let price = null;
    try {
      price = await fetchScryfall(card);
      setStep(2,'Pris hentet','Cardmarket-priser via Scryfall','done');
    } catch(err) {
      log('Scryfall fejl: '+err.message);
      setStep(2,'Scryfall fejlede',''+err.message,'error');
    }

    price ? showResult(card, price) : showFallback(card);
  }

  async function recognizeCard() {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': getApiKey(),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageBase64 }},
            { type: 'text', text: 'Identify this Magic: The Gathering card. Return ONLY raw JSON (no markdown): { "name": "exact English name", "set": "full set name", "set_code": "3-4 letter code", "collector_number": "number or null", "language": "English/German/etc", "foil": true/false/null }' }
          ]
        }]
      })
    });
    if (!resp.ok) {
      const t = await resp.text();
      throw new Error('HTTP ' + resp.status + ' — ' + t.substring(0,80));
    }
    const data = await resp.json();
    const text = data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    return JSON.parse(text.replace(/```json|```/g,'').trim());
  }

  async function fetchScryfall(card) {
    let url = card.set_code && card.collector_number
      ? 'https://api.scryfall.com/cards/'+card.set_code.toLowerCase()+'/'+card.collector_number
      : 'https://api.scryfall.com/cards/named?exact='+encodeURIComponent(card.name)+(card.set_code?'&set='+card.set_code.toLowerCase():'');
    log('Scryfall: '+url);

    let resp = await fetch(url);
    if (!resp.ok) {
      url = 'https://api.scryfall.com/cards/named?fuzzy='+encodeURIComponent(card.name)+(card.set_code?'&set='+card.set_code.toLowerCase():'');
      log('Fuzzy: '+url);
      resp = await fetch(url);
      if (!resp.ok) throw new Error('Ikke fundet (HTTP '+resp.status+')');
    }
    const data = await resp.json();
    const p = data.prices || {};
    log('Priser: '+JSON.stringify(p));
    const eur = p.eur ? parseFloat(p.eur) : null;
    const eurFoil = p.eur_foil ? parseFloat(p.eur_foil) : null;
    if (!eur && !eurFoil) throw new Error('Ingen EUR-prisdata');
    return {
      trend: eur ? eur.toFixed(2)+' €' : null,
      foilPrice: eurFoil ? eurFoil.toFixed(2)+' €' : null,
      scryfallUri: data.scryfall_uri||null,
      cardmarketUri: data.purchase_uris?.cardmarket||null,
      scryfallName: data.name,
      scryfallSet: data.set_name
    };
  }

  function cmUrl(card) {
    return 'https://www.cardmarket.com/en/Magic/Products/Search?searchString='+encodeURIComponent(card.name);
  }

  function resetScan() {
    imageBase64 = null;
    document.getElementById('previewWrap').style.display = 'none';
    document.getElementById('dropZone').style.display = 'block';
    document.getElementById('steps').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('log').style.display = 'none';
    document.getElementById('log').textContent = '';
    document.getElementById('fileInput').value = '';
  }

  function showResult(card, price) {
    const ra = document.getElementById('resultArea');
    ra.style.display = 'block';
    const url = price.cardmarketUri || cmUrl(card);
    ra.innerHTML =
      '<div class="result-card">' +
        '<div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:4px;">' +
          '<div class="card-name">'+esc(price.scryfallName||card.name)+'</div>' +
          '<span class="badge badge-ok">Pris fundet</span>' +
        '</div>' +
        '<div class="card-set">'+esc(price.scryfallSet||card.set||'')+(card.set_code?' ('+card.set_code.toUpperCase()+')':'')+'</div>' +
        '<div class="price-section">' +
          '<div class="price-label">Cardmarket trend-pris</div>' +
          '<div class="price-value">'+(price.trend||'–')+'</div>' +
          (price.foilPrice?'<div class="price-sub">Foil: '+price.foilPrice+'</div>':'') +
        '</div>' +
        (card.language?'<div class="meta-row"><span class="meta-key">Sprog</span><span>'+esc(card.language)+'</span></div>':'') +
        (card.collector_number?'<div class="meta-row"><span class="meta-key">Samlernummer</span><span>'+esc(String(card.collector_number))+'</span></div>':'') +
        (card.foil!=null?'<div class="meta-row"><span class="meta-key">Foil</span><span>'+(card.foil?'Ja':'Nej')+'</span></div>':'') +
        '<div style="margin-top:14px;display:flex;flex-direction:column;gap:8px;">' +
          '<a class="cm-link" href="'+url+'" target="_blank">Se på Cardmarket →</a>' +
          (price.scryfallUri?'<a class="cm-link" href="'+price.scryfallUri+'" target="_blank" style="color:var(--text2);">Se på Scryfall →</a>':'') +
        '</div>' +
      '</div>' +
      '<button class="btn" onclick="resetScan()">Scan nyt kort</button>';
  }

  function showFallback(card) {
    const ra = document.getElementById('resultArea');
    ra.style.display = 'block';
    ra.innerHTML =
      '<div class="result-card">' +
        '<div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:4px;">' +
          '<div class="card-name">'+esc(card.name)+'</div>' +
          '<span class="badge badge-warn">Pris ikke fundet</span>' +
        '</div>' +
        '<div class="card-set">'+esc(card.set||'')+(card.set_code?' ('+card.set_code.toUpperCase()+')':'')+'</div>' +
        '<div class="warn-box">Kunne ikke hente prisen automatisk.</div>' +
        '<a class="cm-link" href="'+cmUrl(card)+'" target="_blank">Åbn på Cardmarket →</a>' +
      '</div>' +
      '<button class="btn" onclick="resetScan()" style="margin-top:8px;">Scan nyt kort</button>';
  }

  function showError(msg) {
    const ra = document.getElementById('resultArea');
    ra.style.display = 'block';
    ra.innerHTML =
      '<div class="result-card">' +
        '<span class="badge badge-err">Fejl</span>' +
        '<p style="font-size:14px;color:var(--danger);margin-top:8px;">'+esc(msg)+'</p>' +
      '</div>' +
      '<button class="btn" onclick="resetScan()" style="margin-top:8px;">Prøv igen</button>';
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
